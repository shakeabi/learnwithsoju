<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <span class="brand">learnwithsoju</span>
  </header>

  <div class="row" id="site-row" hidden>
    <label class="switch">
      <input type="checkbox" id="site-toggle" autocomplete="off" />
      <span class="slider"></span>
    </label>
    <span class="row-label">Enable on <span id="site-host" class="site-host"></span></span>
  </div>

  <div id="status-row" class="status-row">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Checking…</span>
  </div>

  <section id="site-adapter-section" class="adapter-section" hidden></section>

  <section class="lookup-section">
    <label for="lookup-input" class="section-label">Look up a word</label>
    <form id="lookup-form">
      <input
        type="text"
        id="lookup-input"
        class="lookup-input"
        autocomplete="off"
        spellcheck="false"
        placeholder="Paste a Korean word…"
      />
    </form>
    <div id="lookup-result" class="lookup-result" hidden></div>
  </section>

  <div class="actions">
    <button type="button" id="open-options" class="link-btn">Open settings →</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
