<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <span class="brand">learnwithsoju</span>
  </header>

  <div class="row">
    <label class="switch">
      <input type="checkbox" id="enabled-toggle" />
      <span class="slider"></span>
    </label>
    <span class="row-label">Hover dictionary</span>
  </div>

  <div class="row" id="site-row" hidden>
    <label class="switch">
      <input type="checkbox" id="site-toggle" />
      <span class="slider"></span>
    </label>
    <span class="row-label">Enable on <span id="site-host" class="site-host"></span></span>
  </div>

  <div id="status-row" class="status-row">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Checking…</span>
  </div>

  <section id="yt-section" class="yt-section" hidden>
    <h2 class="yt-section-title">Subtitles for this video</h2>
    <div id="yt-section-body">
      <p id="yt-status" class="yt-empty">Detecting…</p>
    </div>
  </section>

  <div class="actions">
    <button type="button" id="open-options" class="link-btn">Open settings →</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
